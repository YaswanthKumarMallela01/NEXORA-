<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA | Verifying Account</title>
    <meta name="description" content="NEXORA authentication callback — verifying your account.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#080b14;--surface:rgba(22,28,44,.7);--primary:#a5b4fc;--primary-container:#6366F1;--primary-glow:rgba(99,102,241,.35);--secondary:#4edea3;--on-surface:#e8eaf6;--on-surface-variant:#8b90a8;--outline:rgba(99,102,241,.15);--error:#fca5a5;}
        body{
            font-family:'Inter',sans-serif;background:var(--bg);color:var(--on-surface);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            background-image:
                radial-gradient(ellipse 50% 40% at 50% 50%,rgba(99,102,241,.12),transparent),
                radial-gradient(rgba(99,102,241,.03) 1px,transparent 1px);
            background-size:100% 100%,24px 24px;
        }
        .container{text-align:center;max-width:440px;padding:40px;animation:fadeUp .5s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}}

        .logo{width:64px;height:64px;margin:0 auto 28px;border-radius:18px;background:linear-gradient(135deg,var(--primary-container),#818cf8);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px var(--primary-glow);}
        h1{font-size:1.5rem;font-weight:300;margin-bottom:10px;}h1 span{font-weight:700;color:var(--primary);}
        .desc{color:var(--on-surface-variant);font-size:.88rem;margin-bottom:32px;line-height:1.55;}

        /* Steps */
        .steps{display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto 32px;text-align:left;}
        .step{display:flex;align-items:center;gap:14px;padding:12px 18px;border-radius:14px;background:var(--surface);border:1px solid var(--outline);transition:all .4s;}
        .step.active{border-color:rgba(99,102,241,.3);}
        .step.done{border-color:rgba(78,222,163,.3);}
        .step.error{border-color:rgba(252,165,165,.3);}
        .step-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;transition:all .3s;}
        .step-icon.pending{background:var(--outline);color:var(--on-surface-variant);}
        .step-icon.active{background:var(--primary-container);color:#fff;}
        .step-icon.done{background:var(--secondary);color:#000;}
        .step-icon.error{background:rgba(252,165,165,.2);color:var(--error);}
        .step-text{font-size:.82rem;font-weight:500;}
        .step-text .sub{display:block;font-size:.7rem;color:var(--on-surface-variant);margin-top:2px;font-weight:400;}

        /* Spinner */
        .spinner{width:32px;height:32px;border:3px solid var(--outline);border-top-color:var(--primary-container);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
        @keyframes spin{to{transform:rotate(360deg);}}

        .countdown{font-family:'JetBrains Mono';font-size:.78rem;color:var(--on-surface-variant);margin-top:8px;}

        .error-msg{color:var(--error);font-size:.88rem;margin:16px 0;line-height:1.5;word-break:break-word;}
        .retry-btn{display:inline-block;margin-top:16px;padding:12px 28px;background:linear-gradient(135deg,var(--primary-container),#818cf8);color:#fff;border:none;border-radius:12px;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px var(--primary-glow);transition:all .2s;}
        .retry-btn:hover{transform:translateY(-2px);}
        .cancel-link{display:inline-block;margin-top:12px;font-size:.78rem;color:var(--on-surface-variant);}
        .cancel-link a{color:var(--primary);text-decoration:none;}.cancel-link a:hover{text-decoration:underline;}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/>
            </svg>
        </div>
        <h1>Verifying your <span>NEXORA</span> account</h1>
        <p class="desc" id="desc">Processing your authentication callback...</p>

        <div class="steps">
            <div class="step" id="step-1">
                <div class="step-icon active" id="icon-1">1</div>
                <div class="step-text">Extracting tokens<span class="sub" id="sub-1">Reading URL callback data</span></div>
            </div>
            <div class="step" id="step-2">
                <div class="step-icon pending" id="icon-2">2</div>
                <div class="step-text">Verifying session<span class="sub" id="sub-2">Validating with Supabase</span></div>
            </div>
            <div class="step" id="step-3">
                <div class="step-icon pending" id="icon-3">3</div>
                <div class="step-text">Setting up dashboard<span class="sub" id="sub-3">Preparing your workspace</span></div>
            </div>
        </div>

        <div class="spinner" id="spinner"></div>
        <p class="countdown" id="countdown"></p>
        <div id="error-area" style="display:none;">
            <p class="error-msg" id="error-msg"></p>
            <a href="/login" class="retry-btn">← Back to Login</a>
            <div class="cancel-link"><a href="/login">Or try logging in again</a></div>
        </div>
    </div>

    <script>
        function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

        function setStep(n, status) {
            var icon = document.getElementById('icon-' + n);
            icon.textContent = status === 'done' ? '✓' : status === 'error' ? '✗' : n;
            icon.className = 'step-icon ' + status;
            document.getElementById('step-' + n).className = 'step ' + status;
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('error-area').style.display = 'block';
            document.getElementById('error-msg').textContent = msg;
            document.getElementById('desc').textContent = 'Something went wrong during verification.';
        }

        (function() {
            try {
                // Step 1: Extract tokens from URL hash
                var hash = window.location.hash.substring(1);
                if (!hash) {
                    setStep(1, 'error');
                    showError('No authentication data found in URL. The confirmation link may have expired or already been used.');
                    return;
                }

                var params = new URLSearchParams(hash);
                var accessToken = params.get('access_token');
                var errorDescription = params.get('error_description');

                if (errorDescription) {
                    setStep(1, 'error');
                    showError(decodeURIComponent(errorDescription.replace(/\+/g, ' ')));
                    return;
                }

                if (!accessToken) {
                    setStep(1, 'error');
                    showError('No access token found. Please try logging in again.');
                    return;
                }

                setStep(1, 'done');
                document.getElementById('sub-1').textContent = 'Token found ✓';

                // Step 2: Store token
                setStep(2, 'active');
                safeSet('nexora_token', accessToken);

                var refreshToken = params.get('refresh_token');
                if (refreshToken) safeSet('nexora_refresh_token', refreshToken);

                var tokenType = params.get('token_type');
                var expiresIn = params.get('expires_in');

                setStep(2, 'done');
                document.getElementById('sub-2').textContent = 'Session valid' + (expiresIn ? ' · ' + Math.round(expiresIn / 3600) + 'h' : '');

                // Step 3: Redirect
                setStep(3, 'active');
                document.getElementById('sub-3').textContent = 'Redirecting in 3s...';

                var count = 3;
                document.getElementById('countdown').textContent = 'Redirecting in ' + count + '...';
                var interval = setInterval(function() {
                    count--;
                    document.getElementById('countdown').textContent = 'Redirecting in ' + count + '...';
                    if (count <= 0) {
                        clearInterval(interval);
                        setStep(3, 'done');
                        window.location.href = '/student';
                    }
                }, 1000);

            } catch (e) {
                setStep(1, 'error');
                showError('Unexpected error: ' + e.message);
            }
        })();
    </script>
</body>
</html>
