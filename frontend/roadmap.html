<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA | My Roadmap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0e1322; --surface: #1a1f2f; --surface-high: #25293a; --surface-highest: #2f3445;
            --primary: #c0c1ff; --primary-container: #6366F1; --secondary: #4edea3;
            --on-surface: #dee1f7; --on-surface-variant: #908fa0; --outline: #464554;
            --error: #ffb4ab; --tertiary: #ffb783;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--on-surface);
            min-height: 100vh; display: flex;
            background-image: radial-gradient(rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .sidebar {
            width: 240px; min-height: 100vh; background: var(--surface);
            border-right: 1px solid rgba(99,102,241,0.1); padding: 24px 16px;
            display: flex; flex-direction: column; position: fixed; left: 0; top: 0;
        }
        .sidebar .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding: 0 8px; }
        .sidebar .brand h2 { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        .sidebar .brand small { display: block; font-family: 'Space Grotesk'; font-size: 0.6rem; color: var(--secondary); letter-spacing: 0.08em; text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; color: var(--on-surface-variant); cursor: pointer; transition: all 0.2s; text-decoration: none; margin-bottom: 4px; }
        .nav-item:hover { background: var(--surface-high); color: var(--on-surface); }
        .nav-item.active { background: var(--surface-highest); color: var(--on-surface); border-left: 3px solid var(--primary-container); }
        .nav-spacer { flex: 1; }
        .logout-btn { color: var(--error); }

        .main { margin-left: 240px; flex: 1; padding: 32px 40px; }

        .page-header { margin-bottom: 32px; }
        .page-header .label { font-family: 'Space Grotesk'; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--on-surface-variant); }
        .page-header h1 { font-size: 2rem; font-weight: 300; margin-top: 4px; }
        .page-header h1 span { font-weight: 700; }
        .page-header p { color: var(--on-surface-variant); font-size: 0.85rem; margin-top: 8px; }

        .stats-row { display: flex; gap: 16px; margin-bottom: 32px; }
        .stat-card {
            background: var(--surface); border: 1px solid rgba(99,102,241,0.15); border-radius: 16px;
            padding: 20px 28px; flex: 1;
        }
        .stat-card .stat-label { font-family: 'Space Grotesk'; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--on-surface-variant); }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 800; margin-top: 4px; }
        .stat-card .stat-value.green { color: var(--secondary); }
        .stat-card .stat-value.orange { color: var(--tertiary); }
        .stat-card .stat-value.purple { color: var(--primary); }

        .filter-row { display: flex; gap: 8px; margin-bottom: 24px; }
        .filter-btn {
            background: var(--surface); border: 1px solid var(--outline); border-radius: 20px;
            padding: 8px 20px; font-size: 0.8rem; color: var(--on-surface-variant);
            cursor: pointer; transition: all 0.2s; font-family: 'Inter';
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary-container); border-color: var(--primary-container); color: white; }

        .task-card {
            background: var(--surface); border: 1px solid rgba(99,102,241,0.1); border-radius: 16px;
            padding: 20px 24px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px;
            transition: border-color 0.2s, transform 0.2s;
        }
        .task-card:hover { border-color: rgba(99,102,241,0.3); transform: translateY(-1px); }

        .task-checkbox {
            width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--outline);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 0.8rem; transition: all 0.2s; flex-shrink: 0;
        }
        .task-checkbox.completed { background: var(--secondary); border-color: var(--secondary); color: #000; }
        .task-checkbox.in_progress { background: var(--tertiary); border-color: var(--tertiary); color: #000; }

        .task-info { flex: 1; }
        .task-title { font-weight: 600; font-size: 0.9rem; }
        .task-title.completed { text-decoration: line-through; opacity: 0.5; }
        .task-meta { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--on-surface-variant); margin-top: 4px; }

        .task-status-badge {
            font-family: 'Space Grotesk'; font-size: 0.65rem; letter-spacing: 0.05em;
            padding: 4px 12px; border-radius: 8px; text-transform: uppercase;
        }
        .task-status-badge.pending { background: rgba(192,193,255,0.1); color: var(--primary); }
        .task-status-badge.in_progress { background: rgba(255,183,131,0.15); color: var(--tertiary); }
        .task-status-badge.completed { background: rgba(78,222,163,0.15); color: var(--secondary); }

        .empty-state { text-align: center; padding: 60px; color: var(--on-surface-variant); }
        .empty-state h3 { font-weight: 400; margin-bottom: 8px; }

        .loading { text-align: center; padding: 40px; color: var(--on-surface-variant); }
        .spinner { width: 28px; height: 28px; border: 3px solid var(--outline); border-top-color: var(--primary-container); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4edea3" stroke-width="2">
                <circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4m-3.5-6.5l-2.8 2.8m-5.4 5.4l-2.8 2.8m0-11l2.8 2.8m5.4 5.4l2.8 2.8"/>
            </svg>
            <div><h2>NEXORA</h2><small>Neural Intelligence</small></div>
        </div>
        <a href="/student" class="nav-item">🏠 Home</a>
        <a href="/resume" class="nav-item">📄 Resume Scan</a>
        <a href="/coach" class="nav-item">🤖 My Coach</a>
        <a href="/interview" class="nav-item">🎤 Mock Interview</a>
        <a href="/roadmap" class="nav-item active">🗺️ My Roadmap</a>
        <div class="nav-spacer"></div>
        <a href="#" class="nav-item logout-btn" onclick="logout()">🚪 Logout</a>
    </nav>

    <div class="main">
        <div class="page-header">
            <div class="label">Task Pipeline</div>
            <h1>My <span>Roadmap</span></h1>
            <p>Tasks assigned by your AI agents — complete them to improve your placement readiness.</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Tasks</div>
                <div class="stat-value purple" id="total-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Completed</div>
                <div class="stat-value green" id="completed-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">In Progress</div>
                <div class="stat-value orange" id="progress-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="pending-count">-</div>
            </div>
        </div>

        <div class="filter-row">
            <button class="filter-btn active" onclick="filterTasks(null, this)">All</button>
            <button class="filter-btn" onclick="filterTasks('pending', this)">Pending</button>
            <button class="filter-btn" onclick="filterTasks('in_progress', this)">In Progress</button>
            <button class="filter-btn" onclick="filterTasks('completed', this)">Completed</button>
        </div>

        <div id="tasks-container">
            <div class="loading"><div class="spinner"></div><p>Loading your tasks...</p></div>
        </div>
    </div>

    <script>
        const API = '';
        const token = localStorage.getItem('nexora_token');
        if (!token) window.location.href = '/login';

        let allTasks = [];

        async function loadTasks() {
            try {
                const r = await fetch(`${API}/api/tasks/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (r.status === 401) { window.location.href = '/login'; return; }
                const data = await r.json();
                allTasks = data.tasks || [];
                updateStats();
                renderTasks(allTasks);
            } catch (e) {
                document.getElementById('tasks-container').innerHTML =
                    `<div class="empty-state"><h3>Failed to load tasks</h3><p>${e.message}</p></div>`;
            }
        }

        function updateStats() {
            const completed = allTasks.filter(t => t.status === 'completed').length;
            const inProgress = allTasks.filter(t => t.status === 'in_progress').length;
            const pending = allTasks.filter(t => t.status === 'pending').length;
            document.getElementById('total-count').textContent = allTasks.length;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('progress-count').textContent = inProgress;
            document.getElementById('pending-count').textContent = pending;
        }

        function renderTasks(tasks) {
            if (tasks.length === 0) {
                document.getElementById('tasks-container').innerHTML =
                    `<div class="empty-state">
                        <h3>No tasks yet</h3>
                        <p>Chat with your AI Coach to get personalized tasks and a study roadmap.</p>
                        <a href="/coach" style="display:inline-block;margin-top:16px;padding:12px 24px;background:var(--primary-container);color:white;border-radius:12px;text-decoration:none;font-size:0.85rem;">Talk to Coach →</a>
                    </div>`;
                return;
            }

            document.getElementById('tasks-container').innerHTML = tasks.map(t => `
                <div class="task-card" data-id="${t.id}">
                    <div class="task-checkbox ${t.status}" onclick="toggleTask('${t.id}', '${t.status}')">
                        ${t.status === 'completed' ? '✓' : t.status === 'in_progress' ? '◉' : ''}
                    </div>
                    <div class="task-info">
                        <div class="task-title ${t.status === 'completed' ? 'completed' : ''}">${t.title || t.description || 'Task'}</div>
                        <div class="task-meta">
                            ${t.due_date ? 'Due: ' + new Date(t.due_date).toLocaleDateString() : 'No due date'}
                            ${t.category ? ' · ' + t.category : ''}
                            ${t.created_at ? ' · Created: ' + new Date(t.created_at).toLocaleDateString() : ''}
                        </div>
                    </div>
                    <span class="task-status-badge ${t.status}">${t.status?.replace('_', ' ') || 'pending'}</span>
                </div>
            `).join('');
        }

        function filterTasks(status, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = status ? allTasks.filter(t => t.status === status) : allTasks;
            renderTasks(filtered);
        }

        async function toggleTask(taskId, currentStatus) {
            const nextStatus = currentStatus === 'pending' ? 'in_progress' :
                              currentStatus === 'in_progress' ? 'completed' : 'pending';
            try {
                await fetch(`${API}/api/tasks/${taskId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: nextStatus })
                });
                loadTasks();  // Reload
            } catch (e) { console.error('Toggle failed:', e); }
        }

        function logout() {
            localStorage.removeItem('nexora_token');
            localStorage.removeItem('nexora_user');
            window.location.href = '/login';
        }

        loadTasks();
    </script>
</body>
</html>
